<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>编辑商品</title>
    <link rel="stylesheet" th:href="@{/css/AddProductStyle.css}">
</head>
<body>
<div class="form-container">
    <div class="header">
        <h2>编辑商品</h2>
        <div class="header-links">
            <a th:href="@{/product/list(childId=${category != null ? category.id : null})}" class="btn-cancel">返回商品列表</a>
        </div>
    </div>

    <form th:action="@{/product/edit}" method="post">
        <input type="hidden" name="id" th:value="${product.id}">
        <input type="hidden" name="childId" th:value="${category != null ? category.id : ''}">
        
        <div class="product-properties">
            <div class="properties-title">商品分类</div>
            <div class="category-section">
                <div class="form-group">
                    <label>洗衣机类型:</label>
                    <select name="type" required>
                        <option value="">请选择洗衣机类型</option>
                        <option th:each="child : ${types}"
                                th:value="${child.id}"
                                th:text="${child.name}"
                                th:selected="${selectedIds.contains(child.id)}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>品牌:</label>
                    <select name="brand" required>
                        <option value="">请选择品牌</option>
                        <option th:each="child : ${brands}"
                                th:value="${child.id}"
                                th:text="${child.name}"
                                th:selected="${selectedIds.contains(child.id)}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>电机类型:</label>
                    <select name="motorType" required>
                        <option value="">请选择电机类型</option>
                        <option th:each="child : ${motorTypes}"
                                th:value="${child.id}"
                                th:text="${child.name}"
                                th:selected="${selectedIds.contains(child.id)}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>洗涤容量:</label>
                    <select name="capacity" required>
                        <option value="">请选择洗涤容量</option>
                        <option th:each="child : ${capacities}"
                                th:value="${child.id}"
                                th:text="${child.name}"
                                th:selected="${selectedIds.contains(child.id)}"></option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="product-properties">
            <div class="properties-title">基本信息</div>
            <div class="form-group">
                <label for="name">商品名称:</label>
                <input type="text" id="name" name="name" th:value="${product.name}" required placeholder="请输入商品名称">
            </div>
            <div class="form-group">
                <label for="model">型号:</label>
                <input type="text" id="model" name="model" th:value="${product.model}" required placeholder="请输入商品型号">
            </div>
            <div class="form-group">
                <label for="price">价格:</label>
                <input type="number" id="price" name="price" step="0.01" th:value="${product.price}" required placeholder="请输入商品价格">
            </div>
        </div>
        
        <div class="product-properties">
            <div class="properties-title">库存与状态</div>
            <div class="form-group">
                <label for="stock">库存数量:</label>
                <input type="number" id="stock" name="stock" min="0" th:value="${product.stock}" required placeholder="请输入库存数量">
            </div>
            
            <div class="form-group">
                <label>商品状态:</label>
                <div class="status-toggle">
                    <div class="status-option" th:classappend="${product.status == 'ACTIVE' ? 'active' : ''}" data-value="ACTIVE">上架</div>
                    <div class="status-option" th:classappend="${product.status == 'INACTIVE' ? 'active' : ''}" data-value="INACTIVE">下架</div>
                    <div class="status-option" th:classappend="${product.status == 'OUT_OF_STOCK' ? 'active' : ''}" data-value="OUT_OF_STOCK">缺货</div>
                </div>
                <input type="hidden" id="status" name="status" th:value="${product.status}">
            </div>
        </div>
        
        <div class="product-properties">
            <div class="properties-title">商品详情</div>
            <div class="form-group">
                <label for="description">商品描述:</label>
                <textarea id="description" name="description" rows="4" th:text="${product.description}" placeholder="请输入商品详细描述"></textarea>
            </div>
        </div>
        
        <div class="form-buttons">
            <button type="submit" class="btn-submit">保存修改</button>
            <a th:href="@{/product/list(childId=${category != null ? category.id : null})}" class="btn-cancel">取消</a>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 商品状态切换
        const statusOptions = document.querySelectorAll('.status-option');
        const statusInput = document.getElementById('status');
        
        statusOptions.forEach(option => {
            option.addEventListener('click', function() {
                statusOptions.forEach(opt => opt.classList.remove('active'));
                this.classList.add('active');
                statusInput.value = this.getAttribute('data-value');
            });
        });
        
        // 确保状态输入有默认值
        if (!statusInput.value) {
            statusInput.value = 'ACTIVE';
            document.querySelector('.status-option[data-value="ACTIVE"]').classList.add('active');
        }
    });
</script>
</body>
</html>
