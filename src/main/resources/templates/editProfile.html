<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>编辑个人信息</title>
    <link rel="stylesheet" th:href="@{/css/AddProductStyle.css}">
    <style>
        .sidebar {
            width: 150px;
            float: left;
            margin-right: 20px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }
        .sidebar a {
            display: block;
            padding: 8px 10px;
            margin-bottom: 5px;
            text-decoration: none;
            color: #333;
            border-radius: 3px;
        }
        .sidebar a:hover {
            background-color: #e0e0e0;
        }
        .sidebar a.active {
            background-color: #4CAF50;
            color: white;
        }
        .main-content {
            margin-left: 170px;
        }
        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <a href="#" class="active">个人信息</a>
        <a th:href="@{/order/list}">我的订单</a>
    </div>
    <div class="main-content">
        <div class="form-container">
            <h2>编辑个人信息</h2>
            <form th:action="@{/user/profile}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label>用户名:</label>
                    <input type="text" name="username" th:value="${user.username}" required>
                </div>
                <div class="form-group">
                    <label>邮箱:</label>
                    <input type="email" name="email" th:value="${user.email}">
                </div>
                <div class="form-group">
                    <label>手机号:</label>
                    <input type="text" name="phone" th:value="${user.phone}">
                </div>
                <div class="form-group">
                    <label>密码:</label>
                    <input type="password" name="password" th:placeholder="'******'" autocomplete="new-password">
                    <small>如需修改请填写新密码，否则留空</small>
                </div>
                <div class="form-group">
                    <label>头像:</label>
                    <input type="file" name="avatar">
                    <div th:if="${user.avatarUrl != null}">
                        <img th:src="@{${user.avatarUrl} + '?t=' + ${#dates.createNow().time}}" alt="头像" style="width:60px;height:60px;border-radius:50%;margin-top:5px;">
                    </div>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn-submit">保存修改</button>
                    <a th:href="@{/user/index}" class="btn-cancel">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
