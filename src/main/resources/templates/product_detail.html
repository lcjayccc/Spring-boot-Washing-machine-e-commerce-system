<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>商品详情</title>
    <link rel="stylesheet" th:href="@{/css/ProductDetailStyle.css}">
    <style>
        .add-to-cart-section {
            display: flex;
            align-items: center;
            margin-top: 20px;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            margin-right: 20px;
        }
        .quantity-btn {
            width: 30px;
            height: 30px;
            background-color: #f8f8f8;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .quantity-btn:hover {
            background-color: #e8e8e8;
        }
        .quantity-input {
            width: 50px;
            height: 30px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin: 0 5px;
        }
        .add-to-cart-btn {
            padding: 10px 30px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .add-to-cart-btn:hover {
            background-color: #c0392b;
        }
        .go-to-cart {
            margin-left: 20px;
            text-decoration: none;
            color: #3498db;
        }
        .go-to-cart:hover {
            text-decoration: underline;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #2ecc71;
            color: white;
            padding: 15px 20px;
            border-radius: 5px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>商品详情</h1>
        <div style="display:flex;align-items:center;">
            <div th:if="${user.avatarUrl != null}" style="margin-right:10px;">
                <img th:src="@{${user.avatarUrl}}" alt="头像" style="width:40px;height:40px;border-radius:50%;vertical-align:middle;">
            </div>
            <span th:text="'欢迎，' + ${user.username}"></span>
            <a th:href="@{/user/profile}" class="btn" style="margin-left:20px;">个人信息</a>
            <a th:href="@{/order/list}" class="btn" style="margin-left:10px;">我的订单</a>
            <a th:href="@{/cart}" class="btn" style="margin-left:10px;">购物车</a>
            <a th:href="@{/user/index}" class="btn" style="margin-left:10px;">返回商品列表</a>
            <a th:href="@{/user/logout}" class="btn" style="margin-left:10px;">退出登录</a>
        </div>
    </div>
    
    <div class="breadcrumb">
        <a th:href="@{/user/index}">首页</a>
        <span>></span>
        <a th:if="${product.categories != null && !product.categories.isEmpty()}" 
           th:href="@{/user/category/{id}(id=${product.categories[0].parent.id})}" 
           th:text="${product.categories[0].parent.name}"></a>
        <span th:if="${product.categories != null && !product.categories.isEmpty()}">></span>
        <span th:text="${product.name}"></span>
    </div>
    
    <div class="product-detail">
        <div class="product-image">
            <img th:src="${product.imageUrl != null} ? @{${product.imageUrl}} : @{/images/default.jpg}" th:alt="${product.name}">
        </div>
        <div class="product-info">
            <h1 class="product-title" th:text="${product.name}"></h1>
            <div class="product-price" th:text="'￥' + ${#numbers.formatDecimal(product.price, 1, 2)}"></div>
            
            <div class="product-meta">
                <div>
                    <strong>型号：</strong> 
                    <span th:text="${product.model}"></span>
                </div>
                <div>
                    <strong>品牌：</strong> 
                    <span th:text="${#lists.size(product.categories.?[parent.id == 2]) > 0} ? ${product.categories.?[parent.id == 2][0].name} : '-'"></span>
                </div>
                <div>
                    <strong>类型：</strong> 
                    <span th:text="${#lists.size(product.categories.?[parent.id == 1]) > 0} ? ${product.categories.?[parent.id == 1][0].name} : '-'"></span>
                </div>
                <div>
                    <strong>电机类型：</strong> 
                    <span th:text="${#lists.size(product.categories.?[parent.id == 3]) > 0} ? ${product.categories.?[parent.id == 3][0].name} : '-'"></span>
                </div>
                <div>
                    <strong>洗涤容量：</strong> 
                    <span th:text="${#lists.size(product.categories.?[parent.id == 4]) > 0} ? ${product.categories.?[parent.id == 4][0].name} : '-'"></span>
                </div>
                <div>
                    <strong>库存状态：</strong> 
                    <span class="stock-status" 
                          th:classappend="${product.stock > 0 ? 'in-stock' : 'out-of-stock'}" 
                          th:text="${product.stock > 0 ? '有货 (' + product.stock + ')' : '缺货'}"></span>
                </div>
                <div>
                    <strong>商品状态：</strong> 
                    <span th:text="${product.status}"></span>
                </div>
            </div>
            
            <div class="add-to-cart-section">
                <div class="quantity-control">
                    <button id="decreaseBtn" class="quantity-btn">-</button>
                    <input id="quantity" type="number" class="quantity-input" value="1" min="1" th:max="${product.stock}" readonly>
                    <button id="increaseBtn" class="quantity-btn">+</button>
                </div>
                <button id="addToCartBtn" class="add-to-cart-btn" th:data-id="${product.id}" th:disabled="${product.stock <= 0}">
                    加入购物车
                </button>
                <a href="/cart" class="go-to-cart">查看购物车</a>
            </div>
            
            <div class="product-description">
                <h3>商品描述</h3>
                <p th:text="${product.description != null ? product.description : '暂无描述'}"></p>
            </div>
        </div>
    </div>
</div>

<div id="notification" class="notification"></div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 获取元素
        const decreaseBtn = document.getElementById('decreaseBtn');
        const increaseBtn = document.getElementById('increaseBtn');
        const quantityInput = document.getElementById('quantity');
        const addToCartBtn = document.getElementById('addToCartBtn');
        const notification = document.getElementById('notification');
        
        // 设置最大库存
        const maxStock = parseInt(quantityInput.getAttribute('max')) || 0;
        
        // 减少数量
        decreaseBtn.addEventListener('click', function() {
            let quantity = parseInt(quantityInput.value);
            if (quantity > 1) {
                quantity--;
                quantityInput.value = quantity;
            }
        });
        
        // 增加数量
        increaseBtn.addEventListener('click', function() {
            let quantity = parseInt(quantityInput.value);
            if (quantity < maxStock) {
                quantity++;
                quantityInput.value = quantity;
            } else {
                showNotification('已达到最大库存量');
            }
        });
        
        // 添加到购物车
        addToCartBtn.addEventListener('click', function() {
            const productId = this.getAttribute('data-id');
            const quantity = parseInt(quantityInput.value);
            
            if (quantity <= 0) {
                showNotification('请选择有效的数量');
                return;
            }
            
            // 发送请求添加到购物车
            fetch('/cart/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `productId=${productId}&quantity=${quantity}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification(data.message);
                } else {
                    showNotification(data.message || '添加失败，请稍后重试');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showNotification('发生错误，请稍后重试');
            });
        });
        
        // 显示通知
        function showNotification(message) {
            notification.textContent = message;
            notification.style.display = 'block';
            
            setTimeout(function() {
                notification.style.display = 'none';
            }, 3000);
        }
    });
</script>
</body>
</html>
