<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>添加商品</title>
    <link rel="stylesheet" th:href="@{/css/AddProductStyle.css}">
</head>
<body>
<div class="form-container">
    <h2>添加新商品</h2>
    <div class="message" th:if="${message}" th:text="${message}"></div>
    <form th:action="@{/product/add}" method="post">
        <div class="category-section">
            <div class="form-group">
                <label>洗衣机类型:</label>
                <select name="type" required>
                    <option value="">请选择洗衣机类型</option>
                    <option th:each="child : ${types}" th:value="${child.id}" th:text="${child.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>品牌:</label>
                <select name="brand" required>
                    <option value="">请选择品牌</option>
                    <option th:each="child : ${brands}" th:value="${child.id}" th:text="${child.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>电机类型:</label>
                <select name="motorType" required>
                    <option value="">请选择电机类型</option>
                    <option th:each="child : ${motorTypes}" th:value="${child.id}" th:text="${child.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>洗涤容量:</label>
                <select name="capacity" required>
                    <option value="">请选择洗涤容量</option>
                    <option th:each="child : ${capacities}" th:value="${child.id}" th:text="${child.name}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="name">商品名称:</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="model">型号:</label>
            <input type="text" id="model" name="model" required>
        </div>
        <div class="form-group">
            <label for="price">价格:</label>
            <input type="number" id="price" name="price" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="description">商品描述:</label>
            <textarea id="description" name="description" rows="4"></textarea>
        </div>
        <div class="form-buttons">
            <button type="submit" class="btn-submit">添加商品</button>
            <a th:href="@{/category/list}" class="btn-cancel">取消</a>
        </div>
    </form>
</div>
</body>
</html>
