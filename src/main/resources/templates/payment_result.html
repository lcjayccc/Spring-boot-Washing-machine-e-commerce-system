<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>支付结果</title>
    <link rel="stylesheet" th:href="@{/css/PaymentResultStyle.css}">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>支付结果</h1>
        <div class="user-info">
            <div th:if="${user.avatarUrl != null}">
                <img th:src="@{${user.avatarUrl}}" alt="头像">
            </div>
            <span th:text="'欢迎，' + ${user.username}"></span>
        </div>
    </div>
    
    <div class="result-box">
        <!-- 支付成功 -->
        <div th:if="${payment != null && paymentSuccess}">
            <div class="result-icon success-icon">✓</div>
            <h2 class="result-title success-title">支付成功</h2>
            <p class="result-info">您的订单已支付成功，我们将尽快为您发货</p>
            
            <div class="result-detail">
                <span class="result-label">订单编号：</span>
                <span class="result-value" th:text="${order.orderNumber}"></span>
            </div>
            
            <div class="result-detail">
                <span class="result-label">支付方式：</span>
                <span class="result-value" th:text="${payment.paymentMethod}"></span>
            </div>
            
            <div class="result-detail">
                <span class="result-label">支付金额：</span>
                <span class="result-value" th:text="'¥' + ${#numbers.formatDecimal(payment.amount, 1, 2)}"></span>
            </div>
            
            <div class="result-detail">
                <span class="result-label">支付时间：</span>
                <span class="result-value" th:text="${#temporals.format(payment.payTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
            </div>
        </div>
        
        <!-- 支付失败 -->
        <div th:if="${payment != null && !paymentSuccess}">
            <div class="result-icon failed-icon">✗</div>
            <h2 class="result-title failed-title">支付失败</h2>
            <p class="result-info">支付过程中发生错误，请稍后重新尝试支付</p>
            
            <div class="result-detail">
                <span class="result-label">订单编号：</span>
                <span class="result-value" th:text="${order.orderNumber}"></span>
            </div>
            
            <div class="result-detail">
                <span class="result-label">支付方式：</span>
                <span class="result-value" th:text="${payment.paymentMethod}"></span>
            </div>
            
            <div class="result-detail">
                <span class="result-label">支付金额：</span>
                <span class="result-value" th:text="'¥' + ${#numbers.formatDecimal(payment.amount, 1, 2)}"></span>
            </div>
        </div>
        
        <!-- 待支付 -->
        <div th:if="${payment == null || (!paymentSuccess && order.status == 'PENDING')}">
            <div class="result-icon pending-icon">!</div>
            <h2 class="result-title pending-title">订单待支付</h2>
            <p class="result-info">您的订单尚未支付，请尽快完成支付以确保商品库存</p>
            
            <div class="result-detail">
                <span class="result-label">订单编号：</span>
                <span class="result-value" th:text="${order.orderNumber}"></span>
            </div>
            
            <div class="result-detail">
                <span class="result-label">下单时间：</span>
                <span class="result-value" th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
            </div>
            
            <div class="result-detail">
                <span class="result-label">订单金额：</span>
                <span class="result-value" th:text="'¥' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span>
            </div>
        </div>
    </div>
    
    <div class="order-details">
        <div class="order-title">
            <span>订单详情</span>
            <span class="order-number" th:text="'订单编号：' + ${order.orderNumber}"></span>
        </div>
        
        <div class="order-items">
            <div class="order-item" th:each="item : ${order.orderItems}">
                <div class="item-image">
                    <img th:src="${item.productImage != null} ? @{${item.productImage}} : @{/images/default.jpg}" alt="商品图片">
                </div>
                <div class="item-details">
                    <div class="item-name" th:text="${item.productName}"></div>
                    <div class="item-model" th:text="'型号：' + ${item.productModel}"></div>
                    <div class="item-price">
                        <span th:text="'¥' + ${#numbers.formatDecimal(item.price, 1, 2)}"></span>
                        <span th:text="' × ' + ${item.quantity}"></span>
                        <span th:text="' = ¥' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="shipping-info">
            <h3>收货信息</h3>
            <p th:text="'收货人：' + ${order.recipientName}"></p>
            <p th:text="'联系电话：' + ${order.recipientPhone}"></p>
            <p th:text="'收货地址：' + ${order.shippingAddress}"></p>
            <p th:if="${order.note}" th:text="'订单备注：' + ${order.note}"></p>
        </div>
        
        <div class="total-info">
            <p>订单总额：<span class="total-price" th:text="'¥' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span></p>
        </div>
    </div>
    
    <div class="action-buttons">
        <!-- 待支付状态显示支付按钮 -->
        <a th:if="${order.status == 'PENDING'}" th:href="@{/order/pay/{id}(id=${order.id})}" class="btn btn-primary">去支付</a>
        
        <a th:href="@{/order/list}" class="btn btn-success">我的订单</a>
        <a th:href="@{/user/index}" class="btn btn-warning">继续购物</a>
    </div>
</div>
</body>
</html>
