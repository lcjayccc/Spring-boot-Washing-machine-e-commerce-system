<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>订单结算</title>
    <link rel="stylesheet" th:href="@{/css/CheckoutStyle.css}">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>订单结算</h1>
        <div class="user-info">
            <div th:if="${user.avatarUrl != null}">
                <img th:src="@{${user.avatarUrl}}" alt="头像">
            </div>
            <span th:text="'欢迎，' + ${user.username}"></span>
        </div>
    </div>
    
    <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>
    
    <div class="products-section">
        <h2 class="section-title">订单商品信息</h2>
        <table class="product-table">
            <thead>
                <tr>
                    <th>商品图片</th>
                    <th>商品名称</th>
                    <th>单价</th>
                    <th>数量</th>
                    <th>小计</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${selectedItems}">
                    <td>
                        <img th:src="${item.product.imageUrl != null} ? @{${item.product.imageUrl}} : @{/images/default.jpg}" 
                             alt="商品图片" class="product-image">
                    </td>
                    <td>
                        <div class="product-name" th:text="${item.product.name}"></div>
                        <div class="product-model" th:text="'型号：' + ${item.product.model}"></div>
                    </td>
                    <td class="product-price" th:text="'¥' + ${#numbers.formatDecimal(item.product.price, 1, 2)}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td class="subtotal" th:text="'¥' + ${#numbers.formatDecimal(item.product.price * item.quantity, 1, 2)}"></td>
                </tr>
            </tbody>
        </table>
        <div class="total-row">
            总计：<span class="total-price" th:text="'¥' + ${#numbers.formatDecimal(total, 1, 2)}"></span>
        </div>
    </div>
    
    <form class="shipping-form" th:action="@{/order/create}" method="post">
        <h2 class="section-title">收货信息</h2>
        
        <div class="form-group">
            <label for="recipientName" class="form-label">收货人</label>
            <input type="text" id="recipientName" name="recipientName" class="form-input" required>
        </div>
        
        <div class="form-group">
            <label for="recipientPhone" class="form-label">联系电话</label>
            <input type="tel" id="recipientPhone" name="recipientPhone" class="form-input" required 
                   pattern="[0-9]{11}" title="请输入11位手机号码">
        </div>
        
        <div class="form-group">
            <label for="shippingAddress" class="form-label">收货地址</label>
            <textarea id="shippingAddress" name="shippingAddress" class="form-textarea" required></textarea>
        </div>
        
        <div class="form-group">
            <label for="note" class="form-label">订单备注（可选）</label>
            <textarea id="note" name="note" class="form-textarea"></textarea>
        </div>
        
        <div class="checkout-actions">
            <a th:href="@{/cart}" class="btn btn-back">返回购物车</a>
            <button type="submit" class="btn btn-submit">提交订单</button>
        </div>
    </form>
</div>
</body>
</html>
