<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>订单详情</title>
    <link rel="stylesheet" th:href="@{/css/OrderDetailStyle.css}">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>订单详情</h1>
        <div class="user-info">
            <div th:if="${user.avatarUrl != null}">
                <img th:src="@{${user.avatarUrl}}" alt="头像">
            </div>
            <span th:text="'欢迎，' + ${user.username}"></span>
        </div>
    </div>
    
    <div class="order-status-bar">
        <div class="status-title">
            <h2 th:text="${order.status == 'PENDING' ? '待支付' : 
                          order.status == 'PAID' ? '已支付' :
                          order.status == 'SHIPPED' ? '已发货' :
                          order.status == 'COMPLETED' ? '已完成' : '已取消'}">
            </h2>
            <p th:if="${order.status == 'PENDING'}">请尽快完成支付，以确保商品库存</p>
            <p th:if="${order.status == 'PAID'}">订单已支付，正在等待发货</p>
            <p th:if="${order.status == 'SHIPPED'}">商品已发货，请留意物流信息</p>
            <p th:if="${order.status == 'SHIPPED' && order.trackingNumber != null}">物流单号: <span th:text="${order.trackingNumber}"></span></p>
            <p th:if="${order.status == 'COMPLETED'}">订单已完成，感谢您的购买</p>
            <p th:if="${order.status == 'CANCELLED'}">订单已取消</p>
            <p th:if="${order.status == 'CANCELLED' && order.cancelReason != null}">取消原因: <span th:text="${order.cancelReason}"></span></p>
        </div>
        
        <!-- 标准流程状态条 -->
        <div th:if="${order.status != 'CANCELLED'}" class="status-steps">
            <div class="status-line">
                <div class="status-line-progress" th:style="${order.status == 'PENDING' ? 'width: 25%' : 
                                                              order.status == 'PAID' ? 'width: 50%' :
                                                              order.status == 'SHIPPED' ? 'width: 75%' :
                                                              order.status == 'COMPLETED' ? 'width: 100%' : 'width: 0%'}">
                </div>
            </div>
            
            <div class="status-step" th:classappend="${order.status != null ? 'active' : ''}">
                <div class="step-icon">1</div>
                <div class="step-label">下单</div>
            </div>
            
            <div class="status-step" th:classappend="${order.status == 'PAID' || order.status == 'SHIPPED' || order.status == 'COMPLETED' ? 'active' : ''}">
                <div class="step-icon">2</div>
                <div class="step-label">支付</div>
            </div>
            
            <div class="status-step" th:classappend="${order.status == 'SHIPPED' || order.status == 'COMPLETED' ? 'active' : ''}">
                <div class="step-icon">3</div>
                <div class="step-label">发货</div>
            </div>
            
            <div class="status-step" th:classappend="${order.status == 'COMPLETED' ? 'active' : ''}">
                <div class="step-icon">4</div>
                <div class="step-label">完成</div>
            </div>
        </div>
        
        <!-- 取消状态 -->
        <div th:if="${order.status == 'CANCELLED'}" class="status-steps">
            <div class="status-step active step-cancelled">
                <div class="step-icon">✕</div>
                <div class="step-label">订单已取消</div>
            </div>
        </div>
    </div>
    
    <div class="order-card">
        <div class="card-title">订单信息</div>
        <div class="order-info-row">
            <div class="order-info-label">订单编号：</div>
            <div class="order-info-value" th:text="${order.orderNumber}"></div>
        </div>
        <div class="order-info-row">
            <div class="order-info-label">下单时间：</div>
            <div class="order-info-value" th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm:ss')}"></div>
        </div>
        <div class="order-info-row" th:if="${order.payTime != null}">
            <div class="order-info-label">支付时间：</div>
            <div class="order-info-value" th:text="${#temporals.format(order.payTime, 'yyyy-MM-dd HH:mm:ss')}"></div>
        </div>
        <div class="order-info-row" th:if="${order.cancelTime != null}">
            <div class="order-info-label">取消时间：</div>
            <div class="order-info-value" th:text="${#temporals.format(order.cancelTime, 'yyyy-MM-dd HH:mm:ss')}"></div>
        </div>
        <div class="order-info-row">
            <div class="order-info-label">订单状态：</div>
            <div class="order-info-value" th:text="${order.status == 'PENDING' ? '待支付' : 
                                                   order.status == 'PAID' ? '已支付' :
                                                   order.status == 'SHIPPED' ? '已发货' :
                                                   order.status == 'COMPLETED' ? '已完成' : '已取消'}">
            </div>
        </div>
    </div>
    
    <div class="order-card">
        <div class="card-title">商品信息</div>
        <div class="order-items">
            <div class="order-item" th:each="item : ${order.orderItems}">
                <div class="item-image">
                    <img th:src="${item.productImage != null} ? @{${item.productImage}} : @{/images/default.jpg}" alt="商品图片">
                </div>
                <div class="item-details">
                    <div>
                        <div class="item-name" th:text="${item.productName}"></div>
                        <div class="item-model" th:text="'型号：' + ${item.productModel}"></div>
                    </div>
                    <div class="item-price-row">
                        <div class="item-price" th:text="'¥' + ${#numbers.formatDecimal(item.price, 1, 2)}"></div>
                        <div class="item-quantity" th:text="'x' + ${item.quantity}"></div>
                        <div class="item-subtotal" th:text="'¥' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="total-info">
            <div class="total-row">
                商品总价：<span th:text="'¥' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span>
            </div>
            <div class="total-row">
                运费：<span>¥0.00</span>
            </div>
            <div class="total-row">
                实付金额：<span class="total-amount" th:text="'¥' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span>
            </div>
        </div>
    </div>
    
    <div class="order-card">
        <div class="card-title">收货信息</div>
        <div class="shipping-info">
            <p th:text="'收货人：' + ${order.recipientName}"></p>
            <p th:text="'联系电话：' + ${order.recipientPhone}"></p>
            <p th:text="'收货地址：' + ${order.shippingAddress}"></p>
            <p th:if="${order.note}" th:text="'订单备注：' + ${order.note}"></p>
        </div>
    </div>
    
    <div class="action-buttons">
        <!-- 根据订单状态显示不同按钮 -->
        <a th:if="${order.status == 'PENDING'}" th:href="@{/order/pay/{id}(id=${order.id})}" class="btn btn-success">去支付</a>
        <button th:if="${order.status == 'PENDING'}" th:data-id="${order.id}" class="btn btn-danger cancel-order">取消订单</button>
        <a th:href="@{/order/list}" class="btn btn-primary">返回订单列表</a>
        <a th:href="@{/user/index}" class="btn btn-warning">继续购物</a>
    </div>
</div>

<div id="notification" class="notification"></div>

<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', function() {
        const cancelButton = document.querySelector('.cancel-order');
        const notification = document.getElementById('notification');
        
        // 确保返回按钮保持登录状态
        const returnButton = document.querySelector('.btn-primary');
        const shopButton = document.querySelector('.btn-warning');
        
        returnButton.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = "/order/list";
        });
        
        shopButton.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = "/user/index";
        });
        
        // 显示通知
        function showNotification(message, isError = false) {
            notification.textContent = message;
            notification.className = 'notification ' + (isError ? 'error' : 'success');
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
        
        // 取消订单
        if (cancelButton) {
            cancelButton.addEventListener('click', function() {
                const orderId = this.getAttribute('data-id');
                
                if (confirm('确定要取消这个订单吗？')) {
                    fetch(`/order/cancel/${orderId}`, {
                        method: 'POST'
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            showNotification(data.message);
                            // 刷新页面
                            setTimeout(() => {
                                window.location.reload();
                            }, 1000);
                        } else {
                            showNotification(data.message, true);
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        showNotification('操作失败，请稍后重试', true);
                    });
                }
            });
        }
    });
    /*]]>*/
</script>
</body>
</html>
