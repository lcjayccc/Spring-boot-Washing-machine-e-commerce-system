<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>用户注册</title>
    <link rel="stylesheet" th:href="@{/css/LoginStyle.css}">
</head>
<body>
<div class="login-container">
    <h2>用户注册</h2>
    <div th:if="${message != null or errorMessage != null}"
         th:classappend="${errorMessage != null} ? 'error-message' : 'success-message'">
        <span th:text="${message != null ? message : errorMessage}"></span>
    </div>
    <form th:action="@{/user/register}" method="post">
        <div class="form-group">
            <label for="username">用户名：</label>
            <input type="text" id="username" name="username" required th:value="${username}">
        </div>
        <div class="form-group">
            <label for="password">密码：</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label for="email">邮箱：</label>
            <input type="email" id="email" name="email" th:value="${email}">
        </div>
        <div class="form-group">
            <label for="phone">手机号：</label>
            <input type="text" id="phone" name="phone" required th:value="${phone}">
        </div>
        <button type="submit" class="btn-login">注册</button>
        <div style="margin-top:10px;">
            <a th:href="@{/user/login}">已有账号？去登录</a>
        </div>
    </form>
</div>
</body>
</html>
