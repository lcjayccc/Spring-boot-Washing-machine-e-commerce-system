<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>订单支付</title>
    <link rel="stylesheet" th:href="@{/css/OrderPayStyle.css}">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>订单支付</h1>
        <div class="user-info">
            <div th:if="${user.avatarUrl != null}">
                <img th:src="@{${user.avatarUrl}}" alt="头像">
            </div>
            <span th:text="'欢迎，' + ${user.username}"></span>
        </div>
    </div>
    
    <div class="order-details">
        <div class="order-title">
            <span>订单详情</span>
            <span class="order-number" th:text="'订单编号：' + ${order.orderNumber}"></span>
        </div>
        
        <div class="order-items">
            <div class="order-item" th:each="item : ${order.orderItems}">
                <div class="item-image">
                    <img th:src="${item.productImage != null} ? @{${item.productImage}} : @{/images/default.jpg}" alt="商品图片">
                </div>
                <div class="item-details">
                    <div class="item-name" th:text="${item.productName}"></div>
                    <div class="item-model" th:text="'型号：' + ${item.productModel}"></div>
                    <div class="item-price">
                        <span th:text="'¥' + ${#numbers.formatDecimal(item.price, 1, 2)}"></span>
                        <span th:text="' × ' + ${item.quantity}"></span>
                        <span th:text="' = ¥' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="shipping-info">
            <h3>收货信息</h3>
            <p th:text="'收货人：' + ${order.recipientName}"></p>
            <p th:text="'联系电话：' + ${order.recipientPhone}"></p>
            <p th:text="'收货地址：' + ${order.shippingAddress}"></p>
            <p th:if="${order.note}" th:text="'订单备注：' + ${order.note}"></p>
        </div>
        
        <div class="total-info">
            <p>订单总额：<span class="total-price" th:text="'¥' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span></p>
        </div>
    </div>
    
    <div class="payment-methods">
        <div class="method-title">请选择支付方式</div>
        <div class="method-options">
            <div class="method-option" data-method="ALIPAY">
                <img th:src="@{/images/alipay.png}" alt="支付宝">
                <div>支付宝</div>
            </div>
            <div class="method-option" data-method="WECHAT">
                <img th:src="@{/images/WechatPay.png}" alt="微信支付">
                <div>微信支付</div>
            </div>
            <div class="method-option" data-method="CREDIT_CARD">
                <img th:src="@{/images/Card.jpg}" alt="信用卡">
                <div>信用卡</div>
            </div>
        </div>
    </div>
    
    <button id="payButton" class="pay-button" disabled>立即支付</button>
    
    <div class="nav-buttons">
        <a th:href="@{/order/list}" class="btn btn-secondary">我的订单</a>
        <a th:href="@{/user/index}" class="btn btn-primary">继续购物</a>
    </div>
</div>

<div id="notification" class="notification"></div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <h2 class="modal-title">支付处理中</h2>
        <div class="loading-spinner"></div>
        <p>请稍候，正在处理您的支付请求...</p>
    </div>
</div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const methodOptions = document.querySelectorAll('.method-option');
        const payButton = document.getElementById('payButton');
        const notification = document.getElementById('notification');
        const paymentModal = document.getElementById('paymentModal');
        let selectedMethod = null;
        
        // 从Thymeleaf获取订单ID和金额
        const orderId = /*[[${order.id}]]*/ 0;
        const orderAmount = /*[[${order.totalAmount}]]*/ 0;
        
        // 选择支付方式
        methodOptions.forEach(option => {
            option.addEventListener('click', function() {
                methodOptions.forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                selectedMethod = this.getAttribute('data-method');
                payButton.disabled = false;
            });
        });
        
        // 显示通知
        function showNotification(message, isError = false) {
            notification.textContent = message;
            notification.className = 'notification ' + (isError ? 'error' : 'success');
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
        
        // 显示支付处理模态框
        function showPaymentModal() {
            paymentModal.style.display = 'flex';
        }
        
        // 隐藏支付处理模态框
        function hidePaymentModal() {
            paymentModal.style.display = 'none';
        }
        
        // 支付按钮点击事件
        payButton.addEventListener('click', function() {
            if (!selectedMethod) {
                showNotification('请选择支付方式', true);
                return;
            }
            
            // 创建支付记录
            fetch('/payment/create', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `orderId=${orderId}&paymentMethod=${selectedMethod}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 创建支付记录成功，处理支付
                    showPaymentModal();
                    
                    // 模拟支付处理延时
                    setTimeout(() => {
                        processPayment(data.paymentId);
                    }, 1500);
                } else {
                    showNotification(data.message, true);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showNotification('创建支付记录失败，请重试', true);
            });
        });
        
        // 处理支付
        function processPayment(paymentId) {
            fetch('/payment/process', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `paymentId=${paymentId}&amount=${orderAmount}`
            })
            .then(response => response.json())
            .then(data => {
                hidePaymentModal();
                
                if (data.success) {
                    showNotification('支付成功！');
                    // 跳转到支付结果页面
                    setTimeout(() => {
                        window.location.href = `/payment/result/${orderId}`;
                    }, 1000);
                } else {
                    showNotification(data.message, true);
                }
            })
            .catch(error => {
                hidePaymentModal();
                console.error('Error:', error);
                showNotification('支付处理失败，请重试', true);
            });
        }
    });
</script>
</body>
</html>
