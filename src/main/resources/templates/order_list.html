<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>我的订单</title>
    <link rel="stylesheet" th:href="@{/css/OrderListStyle.css}">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>我的订单</h1>
        <div class="user-info">
            <div th:if="${user.avatarUrl != null}">
                <img th:src="@{${user.avatarUrl}}" alt="头像">
            </div>
            <span th:text="'欢迎，' + ${user.username}"></span>
        </div>
    </div>
    
    <div class="order-stats">
        <div class="stat-box">
            <div class="stat-number" th:text="${statistics.total}">0</div>
            <div class="stat-label">全部订单</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" th:text="${statistics.pending}">0</div>
            <div class="stat-label">待支付</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" th:text="${statistics.paid}">0</div>
            <div class="stat-label">已支付</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" th:text="${statistics.shipped}">0</div>
            <div class="stat-label">已发货</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" th:text="${statistics.completed}">0</div>
            <div class="stat-label">已完成</div>
        </div>
    </div>
    
    <div class="order-tabs">
        <a th:href="@{/order/list}" class="order-tab" th:classappend="${currentStatus == null} ? 'active' : ''">全部订单</a>
        <a th:href="@{/order/list(status=PENDING)}" class="order-tab" th:classappend="${currentStatus == 'PENDING'} ? 'active' : ''">待支付</a>
        <a th:href="@{/order/list(status=PAID)}" class="order-tab" th:classappend="${currentStatus == 'PAID'} ? 'active' : ''">已支付</a>
        <a th:href="@{/order/list(status=SHIPPED)}" class="order-tab" th:classappend="${currentStatus == 'SHIPPED'} ? 'active' : ''">已发货</a>
        <a th:href="@{/order/list(status=COMPLETED)}" class="order-tab" th:classappend="${currentStatus == 'COMPLETED'} ? 'active' : ''">已完成</a>
        <a th:href="@{/order/list(status=CANCELLED)}" class="order-tab" th:classappend="${currentStatus == 'CANCELLED'} ? 'active' : ''">已取消</a>
    </div>
    
    <div class="orders-list">
        <!-- 空订单提示 -->
        <div class="order-empty" th:if="${orders == null || #lists.isEmpty(orders)}">
            <p>您还没有订单，快去购物吧！</p>
            <a th:href="@{/user/index}" class="btn btn-primary">去购物</a>
        </div>
        
        <!-- 订单列表 -->
        <div th:if="${orders != null && !#lists.isEmpty(orders)}">
            <div class="order-item" th:each="order : ${orders}">
                <div class="order-header">
                    <div>
                        <span class="order-time" th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
                        <span class="order-number" th:text="'订单号：' + ${order.orderNumber}"></span>
                    </div>
                    <div class="order-status" 
                         th:classappend="${'status-' + #strings.toLowerCase(order.status)}"
                         th:text="${order.status == 'PENDING' ? '待支付' : 
                                   order.status == 'PAID' ? '已支付' :
                                   order.status == 'SHIPPED' ? '已发货' :
                                   order.status == 'COMPLETED' ? '已完成' : '已取消'}">
                    </div>
                </div>
                
                <div class="order-content">
                    <div class="order-products">
                        <div class="product-row" th:each="item : ${order.orderItems}">
                            <div class="product-image">
                                <img th:src="${item.productImage != null} ? @{${item.productImage}} : @{/images/default.jpg}" alt="商品图片">
                            </div>
                            <div class="product-info">
                                <div class="product-name" th:text="${item.productName}"></div>
                                <div class="product-meta" th:text="'型号：' + ${item.productModel}"></div>
                                <div class="product-price">
                                    <span th:text="'¥' + ${#numbers.formatDecimal(item.price, 1, 2)}"></span>
                                    <span th:text="' × ' + ${item.quantity}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="order-summary">
                        <div class="order-total">
                            共 <span th:text="${#lists.size(order.orderItems)}"></span> 件商品，
                            合计：<span class="total-amount" th:text="'¥' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span>
                        </div>
                        
                        <div class="order-actions">
                            <a th:href="@{/order/detail/{id}(id=${order.id})}" class="btn btn-primary">订单详情</a>
                            
                            <!-- 待支付订单显示支付和取消按钮 -->
                            <a th:if="${order.status == 'PENDING'}" th:href="@{/order/pay/{id}(id=${order.id})}" class="btn btn-success">去支付</a>
                            <button th:if="${order.status == 'PENDING'}" th:data-id="${order.id}" class="btn btn-danger cancel-order">取消订单</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="navigation-links">
        <a th:href="@{/user/index}" class="btn btn-primary">继续购物</a>
        <a th:href="@{/cart}" class="btn btn-primary">我的购物车</a>
    </div>
</div>

<div id="notification" class="notification"></div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const cancelButtons = document.querySelectorAll('.cancel-order');
        const notification = document.getElementById('notification');
        
        // 显示通知
        function showNotification(message, isError = false) {
            notification.textContent = message;
            notification.className = 'notification ' + (isError ? 'error' : 'success');
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
        
        // 取消订单
        cancelButtons.forEach(button => {
            button.addEventListener('click', function() {
                const orderId = this.getAttribute('data-id');
                
                if (confirm('确定要取消这个订单吗？')) {
                    fetch(`/order/cancel/${orderId}`, {
                        method: 'POST'
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            showNotification(data.message);
                            // 刷新页面
                            setTimeout(() => {
                                window.location.reload();
                            }, 1000);
                        } else {
                            showNotification(data.message, true);
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        showNotification('操作失败，请稍后重试', true);
                    });
                }
            });
        });
    });
</script>
</body>
</html>
